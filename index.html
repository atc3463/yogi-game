<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Yogi London Run</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0e0602;display:flex;align-items:center;justify-content:center;touch-action:none}
#wrap{position:relative;touch-action:none}
canvas{display:block;touch-action:none}
#shop-overlay{position:absolute;inset:0;background:rgba(7,2,1,0.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;padding:24px}
#shop-overlay h2{color:#d4a820;font-family:monospace;font-size:16px;letter-spacing:4px;margin-bottom:6px}
#shop-overlay p{color:#7B2800;font-family:monospace;font-size:10px;letter-spacing:2px;margin-bottom:18px}
.costume-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:400px}
.costume-btn{background:#1a0804;border:2px solid #3a1507;border-radius:8px;padding:12px 6px;cursor:pointer;text-align:center;font-family:monospace;transition:border-color .15s,background .15s}
.costume-btn.selected{border-color:#d4a820;background:#2a1004}
.costume-btn:active{background:#2a1004}
.c-icon{font-size:26px;line-height:1.2}
.c-name{color:#d4a820;font-size:9px;margin-top:5px;letter-spacing:1px}
.c-desc{color:#7B2800;font-size:8px;margin-top:2px}
.shop-close{margin-top:20px;background:#d4a820;color:#0e0602;border:none;font-family:monospace;font-size:13px;font-weight:700;padding:12px 48px;cursor:pointer;border-radius:4px;letter-spacing:2px}
.shop-close:active{background:#c89010}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c"></canvas>
<div id="shop-overlay">
  <h2>YOGI KOSTÜMLERİ</h2>
  <p>BİR KOSTÜM SEÇ</p>
  <div class="costume-grid" id="cgrid"></div>
  <button class="shop-close" onclick="closeShop()">✓ TAMAM</button>
</div>
</div>
<script>
// ── CANVAS SETUP ─────────────────────────────────────────
const C=document.getElementById('c');
const cx=C.getContext('2d');
const W=480,H=620;
C.width=W;C.height=H;

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H,1);
  const w2=Math.round(W*s),h2=Math.round(H*s);
  C.style.width=w2+'px';C.style.height=h2+'px';
  const wrap=document.getElementById('wrap');
  wrap.style.width=w2+'px';wrap.style.height=h2+'px';
  const shop=document.getElementById('shop-overlay');
  shop.style.width=w2+'px';shop.style.height=h2+'px';
}
resize();window.addEventListener('resize',resize);

// ── AUDIO ────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t,v){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t||'square';o.frequency.value=f;
    g.gain.setValueAtTime(v||0.12,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}
function sfxFlap(){tone(340,0.07,'square',0.10);setTimeout(()=>tone(460,0.05,'square',0.07),40);}
function sfxScore(){tone(523,0.06,'sine',0.10);setTimeout(()=>tone(659,0.06,'sine',0.10),65);setTimeout(()=>tone(784,0.10,'sine',0.12),130);}
function sfxDie(){tone(220,0.12,'sawtooth',0.14);setTimeout(()=>tone(160,0.18,'sawtooth',0.11),140);setTimeout(()=>tone(110,0.28,'sawtooth',0.09),280);}
function sfxSelect(){tone(660,0.08,'sine',0.10);setTimeout(()=>tone(880,0.10,'sine',0.10),80);}
function wakeAC(){if(AC.state==='suspended')AC.resume();}

// ── COSTUMES ─────────────────────────────────────────────
const SKINS=[
  {id:'classic', name:'KLASİK',   desc:'Orijinal',  icon:'🐻', hood:'#1a3a1e', cap:'#060c06', acc:'#8B3A00'},
  {id:'sherlock',name:'SHERLOCK', desc:'Dedektif',  icon:'🔍', hood:'#2a1a0e', cap:'#1a0e06', acc:'#c8a060'},
  {id:'royal',   name:'KRALIYET',desc:'Asil',       icon:'👑', hood:'#1a0a2e', cap:'#8B0000', acc:'#d4a820'},
  {id:'ninja',   name:'NİNJA',   desc:'Gizli',      icon:'🥷', hood:'#0a0a0a', cap:'#0a0a0a', acc:'#cc0000'},
  {id:'pirate',  name:'KORSAN',  desc:'Maceraperest',icon:'☠️',hood:'#1a0a0a', cap:'#0a0a0a', acc:'#d4a820'},
  {id:'xmas',    name:'NOEL',    desc:'Şenlikli',   icon:'🎅', hood:'#8B0000', cap:'#8B0000', acc:'#f0f0f0'},
];
let skinIdx=0;
let SK=SKINS[0];

function buildShop(){
  const g=document.getElementById('cgrid');g.innerHTML='';
  SKINS.forEach((s,i)=>{
    const b=document.createElement('div');
    b.className='costume-btn'+(i===skinIdx?' selected':'');
    b.innerHTML=`<div class="c-icon">${s.icon}</div><div class="c-name">${s.name}</div><div class="c-desc">${s.desc}</div>`;
    b.onclick=()=>{skinIdx=i;SK=SKINS[i];sfxSelect();buildShop();};
    g.appendChild(b);
  });
}
buildShop();
function openShop(){document.getElementById('shop-overlay').style.display='flex';buildShop();}
function closeShop(){document.getElementById('shop-overlay').style.display='none';}

// ── HIGH SCORE ───────────────────────────────────────────
function loadBest(){try{return parseInt(localStorage.getItem('ylr_best')||'0');}catch(e){return 0;}}
function saveBest(s){try{localStorage.setItem('ylr_best',String(s));}catch(e){}}

// ── GAME CONSTANTS ───────────────────────────────────────
const FPS=60,DT=1/FPS;
const GRAV=0.48,FLAPV=-9.4,BSPD=3.8;
const GH=80,GAP=158,PW=70,BX=112,BR=20;

// ── GAME STATE ───────────────────────────────────────────
let state='idle';
let score,best=loadBest(),tick,vy,py,ppy;
let pipes,sparks,bgX,gX,spd;
let lt=0,acc=0,it=0,ipy=H/2-50;

function reset(){
  wakeAC();
  score=0;tick=0;vy=0;py=H/2-50;ppy=py;
  pipes=[];sparks=[];bgX=0;gX=0;spd=BSPD;
  state='play';
}

// ── INPUT ────────────────────────────────────────────────
let fq=false;
function doFlap(){
  wakeAC();
  if(state==='play'){fq=true;return;}
  reset();
}

// hit-test shop button area (bottom-right)
function tapShop(ex,ey){
  const rect=C.getBoundingClientRect();
  const sx=(ex-rect.left)*(W/rect.width);
  const sy=(ey-rect.top)*(H/rect.height);
  return sx>W-96&&sy>H-54&&sy<H-8;
}

C.addEventListener('pointerdown',e=>{
  e.preventDefault();wakeAC();
  if(tapShop(e.clientX,e.clientY)){openShop();return;}
  doFlap();
},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doFlap();}
  if(e.code==='KeyS')openShop();
});

// ── HELPERS ─────────────────────────────────────────────
function aabb(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}
function spark(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*3.8;
    sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.2,life:1,col});
  }
}
function spawnPipe(){
  const mn=115,mx=H-GH-GAP-115;
  pipes.push({x:W+40,th:mn+Math.random()*(mx-mn),passed:false,px:W+40});
}

// ── STEP ────────────────────────────────────────────────
function step(){
  if(state!=='play')return;
  tick++;
  if(fq){vy=FLAPV;fq=false;sfxFlap();spark(BX,py,'#8B3A00',6);}
  vy+=GRAV;vy=Math.min(vy,13);
  ppy=py;py+=vy;
  if(py-BR<0){py=BR;vy=0;}
  if(py+BR>=H-GH){py=H-GH-BR;die();return;}
  spd=BSPD+score*0.12;
  bgX-=spd*0.28;gX-=spd;
  const iv=Math.max(92,158-score*5);
  if(tick===1||tick%iv===0)spawnPipe();
  for(let i=pipes.length-1;i>=0;i--){
    const p=pipes[i];p.px=p.x;p.x-=spd;
    if(!p.passed&&p.x+PW<BX){
      p.passed=true;score++;
      if(score>best){best=score;saveBest(best);}
      sfxScore();spark(BX,py,'#c86020',12);
    }
    const m=8,bx2=BX-BR+m,by2=py-BR+m,bs=BR*2-m*2;
    if(aabb(bx2,by2,bs,bs,p.x,0,PW,p.th)){die();return;}
    const bY=p.th+GAP;
    if(aabb(bx2,by2,bs,bs,p.x,bY,PW,H-GH-bY)){die();return;}
    if(p.x<-PW-80)pipes.splice(i,1);
  }
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];s.x+=s.vx;s.y+=s.vy;s.vy+=0.22;s.life-=0.055;
    if(s.life<=0)sparks.splice(i,1);
  }
}

function die(){
  if(state!=='play')return;
  state='dead';
  if(score>best){best=score;saveBest(best);}
  sfxDie();spark(BX,py,'#8B0000',24);
}

// ── DRAW BG ─────────────────────────────────────────────
function drawBG(){
  const sky=cx.createLinearGradient(0,0,0,H-GH);
  sky.addColorStop(0,'#080401');sky.addColorStop(0.55,'#140704');sky.addColorStop(1,'#1e0b06');
  cx.fillStyle=sky;cx.fillRect(0,0,W,H-GH);
  // moon halos
  [48,34].forEach((r,i)=>{cx.fillStyle=`rgba(180,80,15,${i===0?.13:.08})`;cx.beginPath();cx.arc(395,60,r,0,Math.PI*2);cx.fill();});
  cx.fillStyle='#d4781a';cx.beginPath();cx.arc(395,60,20,0,Math.PI*2);cx.fill();
  cx.fillStyle='#e8a040';cx.beginPath();cx.arc(388,56,16,0,Math.PI*2);cx.fill();
  cx.fillStyle='#080401';cx.beginPath();cx.arc(385,54,13,0,Math.PI*2);cx.fill();
  // stars
  [[38,25,.5],[108,14,.4],[182,36,.5],[268,20,.4],[338,42,.5],[442,17,.4],[64,55,.3],[215,52,.4]].forEach(([sx,sy,op])=>{
    cx.globalAlpha=op*(0.4+Math.sin(tick*.04+sx)*.35);
    cx.fillStyle='#c87820';cx.fillRect(sx,sy,1.8,1.8);
  });
  cx.globalAlpha=1;
  // buildings
  [{x:0,w:55,h:118},{x:58,w:40,h:82},{x:100,w:68,h:148},{x:172,w:50,h:102},
   {x:226,w:46,h:132},{x:275,w:62,h:92},{x:341,w:48,h:138},{x:393,w:56,h:108},{x:453,w:50,h:122}].forEach(b=>{
    const bx=((b.x+bgX*0.82)%(W+280)+W+280)%(W+280)-120;
    const by=H-GH-b.h;
    cx.fillStyle='#160502';cx.fillRect(bx,by,b.w,b.h);
    for(let wy=14;wy<b.h-14;wy+=24){
      for(let ww=7;ww<b.w-7;ww+=20){
        cx.fillStyle=(b.x+ww+wy)%4!==0?'rgba(190,85,12,0.42)':'#0d0403';
        cx.fillRect(bx+ww,by+wy,9,12);
      }
    }
    for(let mx=bx;mx<bx+b.w;mx+=10){cx.fillStyle='#1c0702';cx.fillRect(mx,by-6,7,6);}
  });
  // Big Ben
  const bbx=((60+bgX*0.45)%(W+320)+W+320)%(W+320)-140;
  drawBigBenBG(bbx,H-GH);
  // fog
  cx.fillStyle='rgba(90,30,8,0.08)';cx.fillRect(0,H-GH-48,W,48);
}

function drawBigBenBG(bx,by){
  if(bx<-90||bx>W+10)return;
  const gr=cx.createLinearGradient(bx,0,bx+44,0);
  gr.addColorStop(0,'#200a04');gr.addColorStop(0.4,'#341208');gr.addColorStop(1,'#180602');
  cx.fillStyle=gr;cx.fillRect(bx,by-230,44,230);
  cx.fillStyle='#280e06';cx.fillRect(bx-5,by-268,54,48);
  cx.fillStyle='rgba(200,85,12,0.22)';cx.beginPath();cx.arc(bx+22,by-244,18,0,Math.PI*2);cx.fill();
  cx.fillStyle='#260c04';cx.beginPath();cx.arc(bx+22,by-244,14,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#7B2800';cx.lineWidth=1.2;cx.beginPath();cx.arc(bx+22,by-244,14,0,Math.PI*2);cx.stroke();
  const hr=(it*0.002)%(Math.PI*2),mn=(it*0.024)%(Math.PI*2);
  cx.strokeStyle='#c86020';cx.lineWidth=1.8;
  cx.beginPath();cx.moveTo(bx+22,by-244);cx.lineTo(bx+22+Math.cos(hr-Math.PI/2)*8,by-244+Math.sin(hr-Math.PI/2)*8);cx.stroke();
  cx.lineWidth=1.2;cx.beginPath();cx.moveTo(bx+22,by-244);cx.lineTo(bx+22+Math.cos(mn-Math.PI/2)*11,by-244+Math.sin(mn-Math.PI/2)*11);cx.stroke();
  cx.fillStyle='#1a0804';cx.beginPath();cx.moveTo(bx+22,by-314);cx.lineTo(bx-5,by-268);cx.lineTo(bx+49,by-268);cx.closePath();cx.fill();
  cx.fillStyle='#7B2800';cx.fillRect(bx+19,by-318,6,8);
  // brick lines
  cx.strokeStyle='rgba(10,3,1,0.5)';cx.lineWidth=0.6;
  for(let r=by-230;r<by;r+=10){cx.beginPath();cx.moveTo(bx,r);cx.lineTo(bx+44,r);cx.stroke();}
}

function drawGround(){
  cx.fillStyle='#150602';cx.fillRect(0,H-GH,W,GH);
  cx.fillStyle='#1c0804';cx.fillRect(0,H-GH,W,24);
  cx.strokeStyle='rgba(60,15,5,0.7)';cx.lineWidth=0.8;
  const off=(Math.abs(gX)%54+54)%54;
  for(let gx=-off;gx<W;gx+=54){cx.beginPath();cx.moveTo(gx,H-GH);cx.lineTo(gx,H-GH+24);cx.stroke();}
  cx.beginPath();cx.moveTo(0,H-GH+12);cx.lineTo(W,H-GH+12);cx.stroke();
  cx.fillStyle='#0e0402';cx.fillRect(0,H-GH+24,W,GH-24);
  cx.strokeStyle='rgba(120,42,7,0.25)';cx.lineWidth=3;
  cx.setLineDash([30,22]);cx.lineDashOffset=(Math.abs(gX)%54);
  cx.beginPath();cx.moveTo(0,H-GH+52);cx.lineTo(W,H-GH+52);cx.stroke();
  cx.setLineDash([]);
  cx.fillStyle='#7B2800';cx.fillRect(0,H-GH,W,2);
  // lamps
  const loff=(Math.abs(gX)%200+200)%200;
  for(let lx=-loff;lx<W+40;lx+=200){
    cx.fillStyle='#220a02';cx.fillRect(lx,H-GH-90,5,92);cx.fillRect(lx-21,H-GH-88,26,5);
    cx.fillStyle='rgba(200,95,14,0.30)';cx.beginPath();cx.arc(lx-21,H-GH-84,16,0,Math.PI*2);cx.fill();
    cx.fillStyle='#d4781a';cx.beginPath();cx.arc(lx-21,H-GH-84,5,0,Math.PI*2);cx.fill();
    const lg=cx.createLinearGradient(0,H-GH-84,0,H-GH);
    lg.addColorStop(0,'rgba(200,95,14,0.08)');lg.addColorStop(1,'rgba(200,95,14,0)');
    cx.fillStyle=lg;cx.fillRect(lx-34,H-GH-84,28,84);
  }
  // red phone box
  const phx=((Math.abs(gX)*0.32+180)%680+680)%680-56;
  cx.fillStyle='#8B0000';cx.fillRect(phx,H-GH-58,26,58);
  cx.fillStyle='rgba(50,8,8,0.6)';cx.fillRect(phx+2,H-GH-52,22,32);
  cx.fillStyle='#8B0000';cx.fillRect(phx,H-GH-58,26,5);cx.fillRect(phx,H-GH-28,26,4);
  cx.fillStyle='#6B1800';cx.fillRect(phx,H-GH-58,26,2);
}

// ── BIG BEN TOWERS ──────────────────────────────────────
function tower(x,y,w,h,up){
  if(h<=0)return;
  const g=cx.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,'#240c04');g.addColorStop(0.35,'#381407');g.addColorStop(0.65,'#381407');g.addColorStop(1,'#180602');
  cx.fillStyle=g;cx.fillRect(x,y,w,h);
  // brick
  cx.strokeStyle='rgba(9,2,1,0.62)';cx.lineWidth=0.7;
  for(let r=0;r<h;r+=9){
    cx.beginPath();cx.moveTo(x,y+r);cx.lineTo(x+w,y+r);cx.stroke();
    const io=Math.floor(r/9)%2===0?0:13;
    for(let sx=x+io;sx<x+w;sx+=26){cx.beginPath();cx.moveTo(sx,y+r);cx.lineTo(sx,y+r+9);cx.stroke();}
  }
  // amber windows
  for(let wy=(up?32:20);wy<h-(up?10:30);wy+=36){
    cx.fillStyle='rgba(200,85,12,0.46)';cx.fillRect(x+10,y+wy,10,18);cx.fillRect(x+w-20,y+wy,10,18);
  }
  // clock section
  if(h>130){
    const cy=up?30:h-80;
    cx.fillStyle='#1c0802';cx.fillRect(x-4,y+cy,w+8,56);
    cx.fillStyle='rgba(200,85,12,0.26)';cx.beginPath();cx.arc(x+w/2,y+cy+28,20,0,Math.PI*2);cx.fill();
    cx.fillStyle='#280c05';cx.beginPath();cx.arc(x+w/2,y+cy+28,16,0,Math.PI*2);cx.fill();
    cx.strokeStyle='#7B2800';cx.lineWidth=1.4;cx.beginPath();cx.arc(x+w/2,y+cy+28,16,0,Math.PI*2);cx.stroke();
    for(let a=0;a<12;a++){const ra=a*Math.PI/6;cx.fillStyle='#8B3A00';cx.fillRect(x+w/2+Math.cos(ra)*12-1,y+cy+28+Math.sin(ra)*12-1,2,2);}
    const hr=(tick*0.002)%(Math.PI*2),mn=(tick*0.024)%(Math.PI*2);
    cx.strokeStyle='#c86020';cx.lineWidth=2;
    cx.beginPath();cx.moveTo(x+w/2,y+cy+28);cx.lineTo(x+w/2+Math.cos(hr-Math.PI/2)*9,y+cy+28+Math.sin(hr-Math.PI/2)*9);cx.stroke();
    cx.lineWidth=1.5;cx.beginPath();cx.moveTo(x+w/2,y+cy+28);cx.lineTo(x+w/2+Math.cos(mn-Math.PI/2)*13,y+cy+28+Math.sin(mn-Math.PI/2)*13);cx.stroke();
    cx.fillStyle='#7B2800';cx.fillRect(x-4,y+cy,w+8,2);cx.fillRect(x-4,y+cy+56,w+8,2);
  }
  // parapet
  const capY=up?0:h-14;
  cx.fillStyle='#1a0702';cx.fillRect(x-4,y+capY,w+8,14);
  for(let mx=x-4;mx<x+w+4;mx+=12){cx.fillStyle='#240904';cx.fillRect(mx,y+capY+(up?-9:14),8,9);}
  cx.fillStyle='#7B2800';cx.fillRect(x-4,y+capY+(up?0:14),w+8,2);
  // spire
  if(up){
    cx.fillStyle='#160602';cx.beginPath();cx.moveTo(x+w/2,y+h+28);cx.lineTo(x+w/2-8,y+h);cx.lineTo(x+w/2+8,y+h);cx.closePath();cx.fill();
    cx.fillStyle='#7B2800';cx.fillRect(x+w/2-2,y+h+26,4,6);
    cx.fillStyle='rgba(200,85,12,0.5)';cx.beginPath();cx.arc(x+w/2,y+h+28,3,0,Math.PI*2);cx.fill();
  }else{
    cx.fillStyle='#160602';cx.beginPath();cx.moveTo(x+w/2,y-28);cx.lineTo(x+w/2-8,y);cx.lineTo(x+w/2+8,y);cx.closePath();cx.fill();
    cx.fillStyle='#7B2800';cx.fillRect(x+w/2-2,y-32,4,6);
    cx.fillStyle='rgba(200,85,12,0.5)';cx.beginPath();cx.arc(x+w/2,y-28,3,0,Math.PI*2);cx.fill();
  }
  cx.fillStyle='rgba(0,0,0,0.18)';cx.fillRect(x+w-3,y,3,h);
}

function drawGap(x,th,pulse){
  const bY=th+GAP,mid=th+GAP/2,cx2=x+PW/2;
  // fill
  const gg=cx.createLinearGradient(x,th,x,bY);
  gg.addColorStop(0,'rgba(212,168,32,0.24)');gg.addColorStop(0.5,'rgba(255,200,60,0.10)');gg.addColorStop(1,'rgba(212,168,32,0.24)');
  cx.fillStyle=gg;cx.fillRect(x,th,PW,GAP);
  // side lines
  cx.strokeStyle=`rgba(255,210,80,${0.72+pulse*0.28})`;cx.lineWidth=3;
  cx.beginPath();cx.moveTo(x,th+2);cx.lineTo(x,bY-2);cx.stroke();
  cx.beginPath();cx.moveTo(x+PW,th+2);cx.lineTo(x+PW,bY-2);cx.stroke();
  // top band
  cx.fillStyle=`rgba(255,200,50,${0.88+pulse*0.12})`;cx.fillRect(x-4,th-6,PW+8,9);
  cx.fillStyle='rgba(180,100,0,0.55)';cx.fillRect(x-4,th-2,PW+8,2);
  // bottom band
  cx.fillStyle=`rgba(255,200,50,${0.88+pulse*0.12})`;cx.fillRect(x-4,bY-2,PW+8,9);
  cx.fillStyle='rgba(180,100,0,0.55)';cx.fillRect(x-4,bY+2,PW+8,2);
  // arrows
  const ap=0.65+pulse*0.35;
  cx.globalAlpha=ap;cx.fillStyle='#FFD040';
  cx.beginPath();cx.moveTo(cx2-18,mid-11);cx.lineTo(cx2-2,mid);cx.lineTo(cx2-18,mid+11);cx.closePath();cx.fill();
  cx.globalAlpha=ap*0.45;
  cx.beginPath();cx.moveTo(cx2-28,mid-7);cx.lineTo(cx2-16,mid);cx.lineTo(cx2-28,mid+7);cx.closePath();cx.fill();
  cx.globalAlpha=1;
  // center dot
  const dr=5+pulse*3;
  cx.fillStyle=`rgba(255,220,60,${0.5+pulse*0.5})`;cx.beginPath();cx.arc(cx2,mid,dr+7,0,Math.PI*2);cx.fill();
  cx.fillStyle=`rgba(255,200,40,${0.75+pulse*0.25})`;cx.beginPath();cx.arc(cx2,mid,dr,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';cx.beginPath();cx.arc(cx2,mid,2.5,0,Math.PI*2);cx.fill();
}

function drawPipes(alpha){
  const pulse=(Math.sin(tick*0.08)+1)/2;
  pipes.forEach(p=>{
    const ix=p.px+(p.x-p.px)*alpha;
    drawGap(ix,p.th,pulse);
    tower(ix,0,PW,p.th,true);
    tower(ix,p.th+GAP,PW,H-GH-p.th-GAP,false);
  });
}

// ── YOGI ────────────────────────────────────────────────
function drawYogi(y){
  const tilt=Math.max(-0.48,Math.min(0.94,vy*0.052));
  cx.save();cx.translate(BX,y);cx.rotate(tilt);
  // aura
  cx.fillStyle='rgba(139,58,0,0.10)';cx.beginPath();cx.ellipse(0,0,BR+10,BR+10,0,0,Math.PI*2);cx.fill();
  // hoodie body
  cx.fillStyle=SK.hood;cx.beginPath();cx.ellipse(1,3,BR,BR-2,0,0,Math.PI*2);cx.fill();
  cx.fillStyle=SK.hood+'88';cx.beginPath();cx.ellipse(4,5,BR-8,BR-9,0,0,Math.PI*2);cx.fill();
  cx.strokeStyle='rgba(0,0,0,0.3)';cx.lineWidth=1.4;cx.beginPath();cx.moveTo(2,-BR+8);cx.lineTo(2,BR-4);cx.stroke();
  [-4,2,8].forEach(zy=>{cx.fillStyle=SK.acc;cx.fillRect(-2,zy,6,2);});
  // wings
  const wa=Math.sin(tick*0.30)*0.70+(vy<0?-0.54:0.38);
  [-1,1].forEach(s=>{
    cx.save();cx.translate(s*(BR-3),0);cx.rotate(s===-1?Math.PI+wa:-wa);
    cx.fillStyle=SK.hood;cx.beginPath();cx.ellipse(0,0,21,9,0,0,Math.PI);cx.fill();
    cx.fillStyle=SK.acc;cx.fillRect(s===-1?-17:0,-1.5,17,2.5);cx.restore();
  });
  // head — rich brown fur
  const hg=cx.createRadialGradient(-3,-BR+4,2,-1,-BR+6,BR-2);
  hg.addColorStop(0,'#7a4520');hg.addColorStop(1,'#4a2410');
  cx.fillStyle=hg;cx.beginPath();cx.ellipse(-2,-BR+4,BR-3,BR-2,0,0,Math.PI*2);cx.fill();
  // temple shadows
  cx.fillStyle='rgba(24,8,3,0.34)';
  cx.beginPath();cx.ellipse(-BR+5,-BR+8,6,5,0.3,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(BR-6,-BR+8,6,5,-0.3,0,Math.PI*2);cx.fill();
  // ears
  [[-BR+3,-BR-2],[BR-8,-BR-2]].forEach(([ex,ey])=>{
    cx.fillStyle='#572b0d';cx.beginPath();cx.ellipse(ex,ey,7,7,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#771515';cx.beginPath();cx.ellipse(ex,ey,4,4,0,0,Math.PI*2);cx.fill();
  });
  // snout
  cx.fillStyle='#8a5530';cx.beginPath();cx.ellipse(6,-BR+12,8,6,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#190704';cx.beginPath();cx.ellipse(6,-BR+9,4.5,3,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(100,28,8,0.48)';
  cx.beginPath();cx.ellipse(4,-BR+8,1.5,1,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(8,-BR+8,1.5,1,0,0,Math.PI*2);cx.fill();
  // eye
  cx.fillStyle='#f0eedc';cx.beginPath();cx.ellipse(-5,-BR+7,5.5,6,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#4a2204';cx.beginPath();cx.ellipse(-5,-BR+7,4,4.5,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#040202';cx.beginPath();cx.ellipse(-5,-BR+7,2.2,2.5,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';cx.beginPath();cx.arc(-3.5,-BR+5.5,1.4,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(36,10,3,0.50)';cx.beginPath();cx.ellipse(-5,-BR+1.5,6,2,-.2,0,Math.PI*2);cx.fill();
  // snapback — costume color
  cx.fillStyle=SK.cap;cx.beginPath();cx.ellipse(-2,-BR+2,BR-2,5,0,Math.PI,Math.PI*2);cx.fill();
  cx.fillRect(-BR-1,-BR-6,BR*2,7);
  cx.fillStyle=SK.cap+'cc';cx.fillRect(-BR-1,-BR-6,BR*2,3);
  cx.fillStyle=SK.acc;cx.fillRect(-BR-1,-BR+1,BR*2,2);
  cx.fillStyle=SK.cap+'aa';cx.fillRect(-BR-5,-BR+2,20,5);
  cx.fillStyle=SK.acc;cx.font='bold 9px monospace';cx.textAlign='center';cx.fillText('Y',-2,-BR-1);
  cx.restore();
}

function drawSparks(){
  sparks.forEach(s=>{cx.globalAlpha=s.life;cx.fillStyle=s.col;cx.fillRect(s.x-3,s.y-3,6,6);});
  cx.globalAlpha=1;
}

// ── HUD ─────────────────────────────────────────────────
function drawHUD(){
  // score
  cx.fillStyle='rgba(10,4,1,0.78)';cx.beginPath();cx.roundRect(W/2-68,12,136,54,8);cx.fill();
  cx.strokeStyle='rgba(139,58,0,0.38)';cx.lineWidth=1.4;cx.beginPath();cx.roundRect(W/2-68,12,136,54,8);cx.stroke();
  cx.fillStyle='#c86020';cx.font='bold 34px monospace';cx.textAlign='center';
  cx.fillText(score.toString().padStart(3,'0'),W/2,50);
  cx.fillStyle='#7B2800';cx.font='10px monospace';
  cx.fillText('BEST  '+best.toString().padStart(3,'0'),W/2,64);
  // costume btn
  cx.fillStyle='rgba(10,4,1,0.78)';cx.beginPath();cx.roundRect(W-96,H-52,88,40,6);cx.fill();
  cx.strokeStyle='rgba(139,58,0,0.38)';cx.lineWidth=1;cx.beginPath();cx.roundRect(W-96,H-52,88,40,6);cx.stroke();
  cx.fillStyle='#c86020';cx.font='bold 8px monospace';cx.textAlign='center';
  cx.fillText('KOSTÜM',W-52,H-36);
  cx.font='16px monospace';cx.fillText(SKINS[skinIdx].icon,W-52,H-18);
}

function drawVignette(){
  const vg=cx.createRadialGradient(W/2,H/2,H*.14,W/2,H/2,H*.76);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(8,2,1,0.62)');
  cx.fillStyle=vg;cx.fillRect(0,0,W,H);
}

function drawScreen(title,sub,scoreStr,bestStr,btn){
  cx.fillStyle='rgba(6,2,1,0.86)';cx.fillRect(0,0,W,H);
  cx.fillStyle='#8B3A00';cx.font='bold 60px monospace';cx.textAlign='center';cx.fillText('YOGI',W/2,H/2-96);
  cx.fillStyle='#7B1800';cx.font='12px monospace';cx.fillText(title,W/2,H/2-58);
  if(sub){cx.fillStyle='#5B1200';cx.font='10px monospace';cx.fillText(sub,W/2,H/2-38);}
  if(scoreStr){
    cx.fillStyle='rgba(139,58,0,0.14)';cx.beginPath();cx.roundRect(W/2-90,H/2-22,180,72,8);cx.fill();
    cx.fillStyle='#c86020';cx.font='bold 56px monospace';cx.fillText(scoreStr,W/2,H/2+34);
    cx.fillStyle='#7B2800';cx.font='11px monospace';cx.fillText('BEST  '+bestStr,W/2,H/2+54);
  }
  cx.fillStyle='rgba(139,58,0,0.22)';cx.beginPath();cx.roundRect(W/2-124,H/2+64,248,56,7);cx.fill();
  cx.strokeStyle='rgba(139,58,0,0.48)';cx.lineWidth=1.2;cx.beginPath();cx.roundRect(W/2-124,H/2+64,248,56,7);cx.stroke();
  cx.fillStyle='#c86020';cx.font='bold 17px monospace';cx.fillText(btn,W/2,H/2+98);
  cx.fillStyle='rgba(139,58,0,0.5)';cx.font='10px monospace';cx.fillText('TIKLA · SPACE · DOKUNUŞ',W/2,H/2+118);
  // shop btn
  cx.fillStyle='rgba(10,4,1,0.78)';cx.beginPath();cx.roundRect(W-96,H-52,88,40,6);cx.fill();
  cx.strokeStyle='rgba(139,58,0,0.35)';cx.lineWidth=1;cx.beginPath();cx.roundRect(W-96,H-52,88,40,6);cx.stroke();
  cx.fillStyle='#c86020';cx.font='bold 8px monospace';cx.textAlign='center';
  cx.fillText('KOSTÜM',W-52,H-36);
  cx.font='16px monospace';cx.fillText(SKINS[skinIdx].icon,W-52,H-18);
}

// ── MAIN LOOP ────────────────────────────────────────────
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-lt)/1000,0.05);lt=now;

  if(state==='play'){
    acc+=dt;
    while(acc>=DT){step();acc-=DT;}
    const alpha=acc/DT,iy=ppy+(py-ppy)*alpha;
    cx.clearRect(0,0,W,H);
    drawBG();drawGround();drawPipes(alpha);drawYogi(iy);drawSparks();drawHUD();drawVignette();
  }
  else if(state==='idle'){
    it++;tick=it;bgX-=0.52;gX-=1.12;
    ipy=H/2-50+Math.sin(it*.044)*17;
    if(!pipes.length)spawnPipe();
    pipes.forEach(p=>{p.px=p.x;p.x-=0.88;});
    pipes=pipes.filter(p=>p.x>-PW-80);
    sparks.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.vy+=.15;s.life-=.055;});
    sparks=sparks.filter(s=>s.life>0);
    cx.clearRect(0,0,W,H);
    const pulse=(Math.sin(it*0.08)+1)/2;
    drawBG();drawGround();
    pipes.forEach(p=>{drawGap(p.x,p.th,pulse);tower(p.x,0,PW,p.th,true);tower(p.x,p.th+GAP,PW,H-GH-p.th-GAP,false);});
    drawYogi(ipy);drawSparks();drawVignette();
    drawScreen('FLAPPY BIG BEN','LONDRA\'NIN ÜSTÜNDEN UÇ!',null,null,'► TIKLA BAŞLA');
  }
  else{
    it++;tick=it;bgX-=0.32;gX-=0.72;
    sparks.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.vy+=.15;s.life-=.046;});
    sparks=sparks.filter(s=>s.life>0);
    cx.clearRect(0,0,W,H);
    const pulse=(Math.sin(it*0.08)+1)/2;
    drawBG();drawGround();
    pipes.forEach(p=>{drawGap(p.x,p.th,pulse);tower(p.x,0,PW,p.th,true);tower(p.x,p.th+GAP,PW,H-GH-p.th-GAP,false);});
    drawYogi(py);drawSparks();drawVignette();
    drawScreen('GAME OVER','',score.toString().padStart(3,'0'),best.toString().padStart(3,'0'),'↺  TEKRAR OYNA');
  }
}

// ── INIT ─────────────────────────────────────────────────
state='idle';it=0;pipes=[];sparks=[];bgX=0;gX=0;spd=BSPD;
py=H/2-50;ppy=py;vy=0;tick=0;score=0;
requestAnimationFrame(t=>{lt=t;requestAnimationFrame(loop);});
</script>
