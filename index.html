<style>

<div class="modal" id="name-modal">

</div>

<script>
const C=document.getElementById('c');
const cx=C.getContext('2d');
const W=480,H=620;
C.width=W;C.height=H;

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H,1);
  const w2=Math.round(W*s),h2=Math.round(H*s);
  C.style.width=w2+'px';C.style.height=h2+'px';
  const wrap=document.getElementById('wrap');
  wrap.style.width=w2+'px';wrap.style.height=h2+'px';
  ['name-modal','lb-modal','shop-modal'].forEach(id=>{
    const el=document.getElementById(id);
    el.style.width=w2+'px';el.style.height=h2+'px';
  });
}
resize();window.addEventListener('resize',resize);

// ── AUDIO ─────────────────────────────────────────────────
let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function tone(f,d,t,v){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=t||'square';o.frequency.value=f;g.gain.setValueAtTime(v||0.10,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);o.start();o.stop(ac.currentTime+d);}catch(e){}}
function sfxFlap(){tone(340,0.07,'square',0.09);}
function sfxScore(){tone(523,0.05,'sine',0.09);setTimeout(()=>tone(659,0.05,'sine',0.09),55);setTimeout(()=>tone(784,0.09,'sine',0.11),110);}
function sfxDie(){tone(220,0.12,'sawtooth',0.12);setTimeout(()=>tone(150,0.18,'sawtooth',0.10),130);setTimeout(()=>tone(100,0.26,'sawtooth',0.08),260);}
function vib(ms){try{navigator.vibrate&&navigator.vibrate(ms);}catch(e){}}

// ── SKINS ─────────────────────────────────────────────────
const SKINS=[
  {id:'classic', name:'KLASİK',   icon:'🐻',hood:'#1a3a1e',cap:'#060c06',acc:'#8B3A00'},
  {id:'sherlock',name:'SHERLOCK', icon:'🔍',hood:'#2a1a0e',cap:'#1a0e06',acc:'#c8a060'},
  {id:'royal',   name:'KRALIYET', icon:'👑',hood:'#1a0a2e',cap:'#8B0000',acc:'#d4a820'},
  {id:'ninja',   name:'NİNJA',    icon:'🥷',hood:'#0a0a0a',cap:'#0a0a0a',acc:'#cc0000'},
  {id:'pirate',  name:'KORSAN',   icon:'☠️',hood:'#1a0a0a',cap:'#0a0a0a',acc:'#d4a820'},
  {id:'xmas',    name:'NOEL',     icon:'🎅',hood:'#8B0000',cap:'#8B0000',acc:'#f0f0f0'},
];
let skinIdx=0,SK=SKINS[0];
function buildShop(){
  const g=document.getElementById('skin-grid');g.innerHTML='';
  SKINS.forEach((s,i)=>{
    const b=document.createElement('div');
    b.className='skin-btn'+(i===skinIdx?' sel':'');
    b.innerHTML=`<div class="skin-icon">${s.icon}</div><div class="skin-name">${s.name}</div>`;
    b.onclick=()=>{skinIdx=i;SK=SKINS[i];buildShop();sfxScore();};
    g.appendChild(b);
  });
}
buildShop();
document.getElementById('shop-close').onclick=()=>{document.getElementById('shop-modal').style.display='none';};

// ── LEADERBOARD ───────────────────────────────────────────
async function saveScore(name,sc){
  if(!sc||sc<=0)return;
  try{
    const key='ylr_'+name.toUpperCase().replace(/[^A-Z0-9]/g,'_');
    let prev=0;
    try{const ex=await window.storage.get(key,true);if(ex&&ex.value)prev=parseInt(ex.value)||0;}catch(e){}
    if(sc>prev)await window.storage.set(key,String(sc),true);
  }catch(e){}
}
async function loadLB(){
  try{
    const r=await window.storage.list('ylr_',true);
    if(!r||!r.keys||!r.keys.length)return[];
    const entries=[];
    for(const k of r.keys){
      try{const v=await window.storage.get(k,true);if(v&&v.value)entries.push({name:k.replace('ylr_','').replace(/_/g,' '),score:parseInt(v.value)||0});}catch(e){}
    }
    return entries.sort((a,b)=>b.score-a.score).slice(0,15);
  }catch(e){return[];}
}
function showLB(){
  const ov=document.getElementById('lb-modal'),list=document.getElementById('lb-list');
  ov.style.display='flex';
  list.innerHTML='<div style="color:#7B2800;font-family:monospace;font-size:11px;text-align:center;padding:24px">⏳ Yükleniyor...</div>';
  loadLB().then(entries=>{
    list.innerHTML='';
    if(!entries.length){list.innerHTML='<div style="color:#7B2800;font-family:monospace;font-size:11px;text-align:center;padding:20px;line-height:2">Henüz skor yok!<br><span style="color:#d4a820">İlk rekorcu sen ol 🏆</span></div>';return;}
    ['🥇','🥈','🥉',...Array(12).keys()].forEach((med,i)=>{
      if(!entries[i])return;
      const e=entries[i],isMe=e.name.toUpperCase()===playerName.toUpperCase();
      const d=document.createElement('div');d.className='lb-row'+(isMe?' me':'');
      const m=i<3?['🥇','🥈','🥉'][i]:`#${i+1}`;
      d.innerHTML=`<div class="lb-rank">${m}</div><div class="lb-name${isMe?' me':''}">${e.name}${isMe?' ◀':''}</div><div class="lb-score">${e.score.toString().padStart(5,'0')}</div>`;
      list.appendChild(d);
    });
  });
}
document.getElementById('lb-close').onclick=()=>{document.getElementById('lb-modal').style.display='none';};

// ── BEST SCORE ────────────────────────────────────────────
function loadBest(n){try{return parseInt(localStorage.getItem('ylr_b_'+n)||'0');}catch(e){return 0;}}
function saveBest(n,s){try{localStorage.setItem('ylr_b_'+n,String(s));}catch(e){}}

// ── GAME CONSTANTS ────────────────────────────────────────
const FPS=60,DT=1/FPS;
const GH=80,BX=112,BR=20,PW=70;

// ── DIFFICULTY — kademeli, dengeli ───────────────────────
// Formül: her skor için smooth interpolasyon
// 0-5:   çok kolay warm-up
// 5-15:  yavaş yavaş zorlaşmaya başlar
// 15-30: belirgin zorlaşma
// 30-50: ciddi zorluk
// 50+:   maksimum zorluk (ama imkansız değil)
function getDiff(sc){
  // smooth clamp helper
  function lerp(a,b,t){return a+(b-a)*Math.max(0,Math.min(1,t));}

  let spd,gap,interval;

  if(sc<=5){
    // 0-5: çok kolay — yavaş, geniş boşluk
    const t=sc/5;
    spd     =lerp(2.0,2.4,t);
    gap     =lerp(195,185,t);
    interval=lerp(195,185,t);
  } else if(sc<=15){
    // 5-15: fark edilir ama rahat
    const t=(sc-5)/10;
    spd     =lerp(2.4,3.0,t);
    gap     =lerp(185,172,t);
    interval=lerp(185,170,t);
  } else if(sc<=30){
    // 15-30: gerçek zorluk başlar
    const t=(sc-15)/15;
    spd     =lerp(3.0,3.7,t);
    gap     =lerp(172,158,t);
    interval=lerp(170,152,t);
  } else if(sc<=50){
    // 30-50: zorlu
    const t=(sc-30)/20;
    spd     =lerp(3.7,4.4,t);
    gap     =lerp(158,148,t);
    interval=lerp(152,136,t);
  } else if(sc<=75){
    // 50-75: çok zorlu
    const t=(sc-50)/25;
    spd     =lerp(4.4,5.0,t);
    gap     =lerp(148,142,t);
    interval=lerp(136,122,t);
  } else {
    // 75+: maksimum — ama sabit, daha fazla artmaz
    spd     =5.2;
    gap     =138;
    interval=115;
  }

  return{spd,gap:Math.round(gap),interval:Math.round(interval)};
}

// ── STATE ─────────────────────────────────────────────────
let state='name';
let playerName='';
let score,best,tick,vy,py,prevPy;
let pipes,sparks,bgX,gX;
let lt=0,accum=0;
let idleTick=0,idlePy=H/2-50;
let tutStep=0,tutAnim=0;
let cdTimer=0,cdAnim=0;
let combo=0,comboMax=0;
let scorePopups=[];
let isNewRecord=false;
let adCounter=0;

// ── NAME ─────────────────────────────────────────────────
document.getElementById('name-modal').style.display='flex';
const nameInput=document.getElementById('name-input');
setTimeout(()=>nameInput.focus(),400);
function confirmName(){
  const n=nameInput.value.trim();
  if(n.length<2){nameInput.style.borderColor='#cc4444';nameInput.placeholder='EN AZ 2 HARF!';nameInput.value='';return;}
  playerName=n.toUpperCase().substring(0,12);
  best=loadBest(playerName);
  document.getElementById('name-modal').style.display='none';
  state='idle';
}
document.getElementById('name-btn').onclick=confirmName;
nameInput.addEventListener('keydown',e=>{if(e.key==='Enter')confirmName();});

// ── PAUSE ─────────────────────────────────────────────────
const pauseBtn=document.getElementById('pause-btn');
pauseBtn.onclick=()=>{
  if(state==='play'){state='paused';pauseBtn.textContent='▶';}
  else if(state==='paused'){state='play';pauseBtn.textContent='⏸';}
};

// ── INPUT ─────────────────────────────────────────────────
let fq=false;
function doFlap(){
  getAC();
  if(state==='idle'){state='tutorial';tutStep=0;tutAnim=0;py=H/2-50;vy=0;pipes=[];sparks=[];bgX=0;gX=0;return;}
  if(state==='tutorial'){if(tutStep===0)tutStep=1;else{state='countdown';cdTimer=0;cdAnim=0;py=H/2-50;vy=0;}return;}
  if(state==='countdown')return;
  if(state==='paused'){state='play';pauseBtn.textContent='⏸';return;}
  if(state==='dead'){state='tutorial';tutStep=0;tutAnim=0;py=H/2-50;vy=0;pipes=[];sparks=[];bgX=0;gX=0;return;}
  if(state==='play')fq=true;
}
function tapTest(ex,ey){
  const rect=C.getBoundingClientRect();
  const sx=(ex-rect.left)*(W/rect.width),sy=(ey-rect.top)*(H/rect.height);
  if((state==='idle'||state==='dead')&&sx>W-118&&sy>H-55&&sy<H-8){showLB();return true;}
  if((state==='idle'||state==='dead')&&sx>W-118&&sy>H-107&&sy<H-60){document.getElementById('shop-modal').style.display='flex';buildShop();return true;}
  return false;
}
C.addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(['lb-modal','shop-modal','name-modal'].some(id=>document.getElementById(id).style.display==='flex'))return;
  if(!tapTest(e.clientX,e.clientY))doFlap();
},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doFlap();}
  if(e.code==='KeyL')showLB();
  if(e.code==='KeyS'){document.getElementById('shop-modal').style.display='flex';buildShop();}
  if(e.code==='Escape'||e.code==='KeyP')pauseBtn.click();
});

// ── GAME LOGIC ────────────────────────────────────────────
function spark(x,y,col,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*3.5;sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.2,life:1,col});}
}
function aabb(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

function spawnPipe(){
  const diff=getDiff(score);
  const mn=110,mx=H-GH-diff.gap-110;
  if(mx<=mn)return;
  pipes.push({x:W+40,topH:mn+Math.random()*(mx-mn),passed:false,px:W+40,gap:diff.gap});
}

function step(){
  if(state!=='play')return;
  tick++;
  if(fq){vy=-9.4;fq=false;sfxFlap();vib(20);spark(BX,py,'#8B3A00',5);}
  vy+=0.50;vy=Math.min(vy,12);
  prevPy=py;py+=vy;
  if(py-BR<0){py=BR;vy=0;}
  if(py+BR>=H-GH){py=H-GH-BR;die();return;}

  const diff=getDiff(score);
  bgX-=diff.spd*0.28;
  gX -=diff.spd*1.00;

  if(tick===1||tick%diff.interval===0)spawnPipe();

  for(let i=pipes.length-1;i>=0;i--){
    const p=pipes[i];p.px=p.x;p.x-=diff.spd;
    if(!p.passed&&p.x+PW<BX){
      p.passed=true;score++;combo++;
      if(combo>comboMax)comboMax=combo;
      if(score>best){best=score;saveBest(playerName,best);isNewRecord=true;}
      sfxScore();vib(30);
      const txt=combo>=5?`+1 🔥x${combo}`:'+1';
      const col=combo>=5?'#ff6020':'#d4a820';
      scorePopups.push({x:BX+40,y:py-30,text:txt,life:1.2,col});
      saveScore(playerName,score);
    }
    const m=14,bx2=BX-BR+m,by2=py-BR+m,bs=BR*2-m*2;
    if(aabb(bx2,by2,bs,bs,p.x,0,PW,p.topH)){die();return;}
    const bY=p.topH+p.gap;
    if(aabb(bx2,by2,bs,bs,p.x,bY,PW,H-GH-bY)){die();return;}
    if(p.x<-PW-80)pipes.splice(i,1);
  }
  for(let i=sparks.length-1;i>=0;i--){const s=sparks[i];s.x+=s.vx;s.y+=s.vy;s.vy+=0.22;s.life-=0.055;if(s.life<=0)sparks.splice(i,1);}
  for(let i=scorePopups.length-1;i>=0;i--){const p=scorePopups[i];p.y-=1.2;p.life-=0.04;if(p.life<=0)scorePopups.splice(i,1);}
}

function die(){
  if(state!=='play')return;
  state='dead';combo=0;
  if(score>best){best=score;saveBest(playerName,best);isNewRecord=true;}
  sfxDie();vib([100,50,200]);
  spark(BX,py,'#8B0000',22);
  adCounter++;
  pauseBtn.style.display='none';
  if(adCounter%3===0)console.log('📺 AdMob: Interstitial burada gösterilir');
  saveScore(playerName,score);
}

// ── DRAW ─────────────────────────────────────────────────
function drawBG(t){
  const sky=cx.createLinearGradient(0,0,0,H-GH);
  sky.addColorStop(0,'#090401');sky.addColorStop(0.55,'#150704');sky.addColorStop(1,'#200c06');
  cx.fillStyle=sky;cx.fillRect(0,0,W,H-GH);
  cx.fillStyle='rgba(180,80,15,0.13)';cx.beginPath();cx.arc(400,62,48,0,Math.PI*2);cx.fill();
  cx.fillStyle='#d4781a';cx.beginPath();cx.arc(400,62,20,0,Math.PI*2);cx.fill();
  cx.fillStyle='#e8a040';cx.beginPath();cx.arc(393,57,16,0,Math.PI*2);cx.fill();
  cx.fillStyle='#090401';cx.beginPath();cx.arc(390,55,13,0,Math.PI*2);cx.fill();
  [[38,25,.5],[108,14,.4],[182,36,.5],[268,20,.4],[338,42,.5],[450,17,.4],[64,55,.3],[215,52,.4]].forEach(([sx,sy,op])=>{
    cx.globalAlpha=op*(0.4+Math.sin(t*.04+sx)*.35);cx.fillStyle='#c87820';cx.fillRect(sx,sy,1.8,1.8);
  });cx.globalAlpha=1;
  [{x:0,w:55,h:118},{x:58,w:40,h:82},{x:100,w:68,h:148},{x:172,w:50,h:102},
   {x:226,w:46,h:132},{x:275,w:62,h:92},{x:341,w:48,h:138},{x:393,w:56,h:108},{x:453,w:50,h:122}].forEach(b=>{
    const bx=((b.x+bgX*0.82)%(W+280)+W+280)%(W+280)-120;
    const by=H-GH-b.h;
    cx.fillStyle='#160502';cx.fillRect(bx,by,b.w,b.h);
    for(let wy=14;wy<b.h-14;wy+=24)for(let ww=7;ww<b.w-7;ww+=20){cx.fillStyle=(b.x+ww+wy)%4!==0?'rgba(190,85,12,0.42)':'#0d0403';cx.fillRect(bx+ww,by+wy,9,12);}
  });
  cx.fillStyle='rgba(90,30,8,0.08)';cx.fillRect(0,H-GH-48,W,48);
}

function drawGround(){
  cx.fillStyle='#150602';cx.fillRect(0,H-GH,W,GH);
  cx.fillStyle='#1c0804';cx.fillRect(0,H-GH,W,24);
  cx.strokeStyle='rgba(60,15,5,0.7)';cx.lineWidth=0.8;
  const off=(Math.abs(gX)%54+54)%54;
  for(let gx2=-off;gx2<W;gx2+=54){cx.beginPath();cx.moveTo(gx2,H-GH);cx.lineTo(gx2,H-GH+24);cx.stroke();}
  cx.beginPath();cx.moveTo(0,H-GH+12);cx.lineTo(W,H-GH+12);cx.stroke();
  cx.fillStyle='#0e0402';cx.fillRect(0,H-GH+24,W,GH-24);
  cx.fillStyle='#7B2800';cx.fillRect(0,H-GH,W,2);
  const loff=(Math.abs(gX)%200+200)%200;
  for(let lx=-loff;lx<W+40;lx+=200){
    cx.fillStyle='#220a02';cx.fillRect(lx,H-GH-90,5,92);cx.fillRect(lx-21,H-GH-88,26,5);
    cx.fillStyle='rgba(200,95,14,0.30)';cx.beginPath();cx.arc(lx-21,H-GH-84,16,0,Math.PI*2);cx.fill();
    cx.fillStyle='#d4781a';cx.beginPath();cx.arc(lx-21,H-GH-84,5,0,Math.PI*2);cx.fill();
  }
  const phx=((Math.abs(gX)*0.32+180)%680+680)%680-56;
  cx.fillStyle='#8B0000';cx.fillRect(phx,H-GH-55,24,55);
  cx.fillStyle='rgba(50,8,8,0.65)';cx.fillRect(phx+2,H-GH-50,20,30);
  cx.fillStyle='#8B0000';cx.fillRect(phx,H-GH-55,24,5);cx.fillRect(phx,H-GH-27,24,4);
}

function tower(x,y,w,h,up){
  if(h<=0)return;
  const g=cx.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,'#240c04');g.addColorStop(0.35,'#381407');g.addColorStop(0.65,'#381407');g.addColorStop(1,'#180602');

function drawGap(x,topH,gap,pulse){
  const bY=topH+gap,cx2=x+PW/2,mid=topH+gap/2;
  const gg=cx.createLinearGradient(x,topH,x,bY);
  gg.addColorStop(0,'rgba(212,168,32,0.22)');gg.addColorStop(0.5,'rgba(255,200,60,0.10)');gg.addColorStop(1,'rgba(212,168,32,0.22)');
  cx.fillStyle=gg;cx.fillRect(x,topH,PW,gap);
  cx.strokeStyle=`rgba(255,210,80,${0.72+pulse*0.28})`;cx.lineWidth=3;
  cx.beginPath();cx.moveTo(x,topH+2);cx.lineTo(x,bY-2);cx.stroke();
  cx.beginPath();cx.moveTo(x+PW,topH+2);cx.lineTo(x+PW,bY-2);cx.stroke();
  cx.fillStyle=`rgba(255,200,50,${0.88+pulse*0.12})`;cx.fillRect(x-4,topH-6,PW+8,9);
  cx.fillStyle=`rgba(255,200,50,${0.88+pulse*0.12})`;cx.fillRect(x-4,bY-2,PW+8,9);
  cx.globalAlpha=0.65+pulse*0.35;cx.fillStyle='#FFD040';
  cx.beginPath();cx.moveTo(cx2-18,mid-11);cx.lineTo(cx2-2,mid);cx.lineTo(cx2-18,mid+11);cx.closePath();cx.fill();
  cx.globalAlpha=1;
  cx.fillStyle=`rgba(255,220,60,${0.5+pulse*0.5})`;cx.beginPath();cx.arc(cx2,mid,8+pulse*3,0,Math.PI*2);cx.fill();
  cx.fillStyle=`rgba(255,200,40,${0.75+pulse*0.25})`;cx.beginPath();cx.arc(cx2,mid,5+pulse*3,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';cx.beginPath();cx.arc(cx2,mid,2.5,0,Math.PI*2);cx.fill();
}

function drawAllPipes(alpha){
  const pulse=(Math.sin(tick*0.08)+1)/2;
  pipes.forEach(p=>{

}

    cx.fillStyle='#c86020';cx.font='bold 15px monospace';cx.fillText('↺  TEKRAR OYNA',W/2,H/2+139);
  } else {
    cx.fillStyle=`rgba(139,58,0,${0.22+pulse*0.12})`;cx.beginPath();cx.roundRect(W/2-130,H/2-18,260,56,8);cx.fill();
    cx.strokeStyle=`rgba(212,168,32,${0.5+pulse*0.4})`;cx.lineWidth=1.5;cx.beginPath();cx.roundRect(W/2-130,H/2-18,260,56,8);cx.stroke();
    cx.fillStyle='#c86020';cx.font='bold 17px monospace';cx.textAlign='center';cx.fillText('► TIKLA BAŞLA',W/2,H/2+16);
    cx.fillStyle='rgba(139,58,0,0.5)';cx.font='10px monospace';cx.fillText('TIKLA · SPACE · DOKUNUŞ',W/2,H/2+38);
  }
  drawSideBtns();
}

function drawPaused(){
  cx.fillStyle='rgba(4,8,10,0.75)';cx.fillRect(0,0,W,H);
  cx.fillStyle='#d4a820';cx.font='bold 36px monospace';cx.textAlign='center';cx.fillText('⏸ DURAKLADI',W/2,H/2-10);
  cx.fillStyle='#7B2800';cx.font='12px monospace';cx.fillText('devam etmek için tıkla',W/2,H/2+24);
}

// ── MAIN LOOP ─────────────────────────────────────────────
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-lt)/1000,0.05);lt=now;
  if(state==='name')return;
  cx.clearRect(0,0,W,H);

  if(state==='play'){
    accum+=dt;while(accum>=DT){step();accum-=DT;}
    const alpha=accum/DT,iy=prevPy+(py-prevPy)*alpha;
    drawBG(tick);drawGround();drawAllPipes(alpha);drawYogi(iy);drawSparks();drawScorePopups();drawHUD();drawVignette();
  } else if(state==='paused'){
    drawBG(tick);drawGround();drawAllPipes(1);drawYogi(py);drawPaused();drawVignette();
  } else if(state==='tutorial'){
    tutAnim+=dt;bgX-=0.4;gX-=0.9;drawTutorial();drawVignette();
  } else if(state==='countdown'){
    drawCountdown(dt);
  } else if(state==='idle'){
    idleTick++;bgX-=0.5;gX-=1.1;
    idlePy=H/2-50+Math.sin(idleTick*.044)*17;
    drawBG(idleTick);drawGround();drawYogi(idlePy,idleTick*0.016);drawVignette();
    drawOverlay('FLAPPY BIG BEN');
  } else {
    idleTick++;bgX-=0.32;gX-=0.72;
    sparks.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.vy+=.15;s.life-=.048;});
    sparks=sparks.filter(s=>s.life>0);
    drawBG(idleTick);drawGround();
    pipes.forEach(p=>{
      const pulse=(Math.sin(idleTick*0.08)+1)/2;
      drawGap(p.x,p.topH,p.gap,pulse);tower(p.x,0,PW,p.topH,true);tower(p.x,p.topH+p.gap,PW,H-GH-p.topH-p.gap,false);
    });
    drawYogi(py,idleTick*0.016);drawSparks();drawVignette();
    drawOverlay('GAME OVER',score,best);
  }
}

// ── INIT ──────────────────────────────────────────────────
pipes=[];sparks=[];bgX=0;gX=0;py=H/2-50;prevPy=py;vy=0;tick=0;score=0;best=0;
combo=0;comboMax=0;scorePopups=[];isNewRecord=false;adCounter=0;
requestAnimationFrame(t=>{lt=t;requestAnimationFrame(loop);});
</script>
